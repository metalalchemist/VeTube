name: VeTube-x64

on:
  push:
    tags: ["*"]
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Source checkout
        uses: actions/checkout@v6

      - name: Configure Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
          architecture: x64

      - name: Install dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install pyinstaller gdown
          pip install --upgrade pyzmq httpx httpcore future

      - name: Compiling
        run: |
          pyinstaller run_main_window.py --windowed
          cd dist
          Rename-Item run_main_window VeTube
          cd ..
          cp -R bootstrap.exe dist/VeTube/
          cp -R chat_downloader dist/VeTube/_internal/
          cp -R 64 dist/VeTube/_internal/
          cp -R translates/languages.json dist/VeTube/
          cp -R locales dist/VeTube/
          cp -R sounds dist/VeTube/
      - uses: actions/upload-artifact@v7
        with:
          name: VeTube-x64
          path: dist/VeTube
          if-no-files-found: error
      - name: zip packaging
        run: |
          cd dist/VeTube
          7z a ../../VeTube-x64.zip .
          cd ../../
      - name: vetube_release
        uses: softprops/action-gh-release@v3
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          files: VeTube-x64.zip
          prerelease: ${{ contains(github.ref, '-') }}
